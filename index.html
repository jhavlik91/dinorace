<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DinoRace — prototyp</title>
  <style>
    :root { color-scheme: dark; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; background: #0b1020; font-family: system-ui, sans-serif; }
    #app { position: fixed; inset: 0; }

    /* HUD */
    .hud { position: fixed; pointer-events: none; color: #fff; text-shadow: 2px 2px 0 #000; }
    #topleft  { top: 16px; left: 16px; font-weight: 800; }
    #topleft .species { font-size: 22px; letter-spacing: .5px; }
    #topleft .attack  { font-size: 14px; opacity: .85; margin-top: 4px; }
    #topleft .stamina { display: flex; align-items: center; gap: 7px; margin-top: 7px;
      font-size: 12px; font-weight: 700; }
    #topleft .stamina i { display: block; width: 140px; height: 9px; background: #1b1f2a;
      border: 2px solid #000; border-radius: 5px; overflow: hidden; }
    #topleft .stamina b { display: block; height: 100%; width: 100%; background: #56d364;
      transition: width .1s linear, background .2s; }
    #topleft .rage { display: flex; align-items: center; gap: 7px; margin-top: 6px;
      font-size: 12px; font-weight: 700; }
    #topleft .rage i { display: block; width: 140px; height: 9px; background: #1b1f2a;
      border: 2px solid #000; border-radius: 5px; overflow: hidden; }
    #topleft .rage b { display: block; height: 100%; width: 0%;
      background: linear-gradient(90deg, #ffb24a, #f8514a); transition: width .12s; }
    #topleft .item { margin-top: 8px; font-size: 14px; font-weight: 800; }
    #topleft .item b { color: #ffe14d; }
    #topleft .item small { opacity: .6; font-weight: 600; }
    #topright { top: 16px; right: 16px; text-align: right; font-weight: 800; }
    #topright .lap  { font-size: 26px; }
    #topright .pos  { font-size: 15px; opacity: .9; }
    #speedo { bottom: 16px; right: 20px; font-size: 40px; font-weight: 900; }
    #speedo small { font-size: 14px; opacity: .7; }

    /* komiksová bublina při útoku */
    #fx { position: fixed; inset: 0; pointer-events: none; }
    .pow {
      position: absolute; transform: translate(-50%,-50%) rotate(var(--r,0deg));
      font-weight: 900; font-size: 38px; color: #ffe14d;
      -webkit-text-stroke: 3px #000; text-stroke: 3px #000;
      animation: popfx .5s ease-out forwards;
    }
    @keyframes popfx {
      0%   { opacity: 0; transform: translate(-50%,-50%) scale(.3) rotate(var(--r,0deg)); }
      30%  { opacity: 1; transform: translate(-50%,-50%) scale(1.2) rotate(var(--r,0deg)); }
      100% { opacity: 0; transform: translate(-50%,-90%) scale(1) rotate(var(--r,0deg)); }
    }

    #help {
      position: fixed; bottom: 16px; left: 16px; color: #cdd6ff;
      font-size: 13px; line-height: 1.6; background: rgba(10,14,30,.55);
      padding: 10px 14px; border-radius: 10px; border: 1px solid rgba(255,255,255,.12);
    }
    #help b { color: #fff; }
    kbd {
      background: #1c2547; border: 1px solid #3a4a8a; border-bottom-width: 2px;
      border-radius: 5px; padding: 1px 6px; font-family: ui-monospace, monospace; color: #fff;
    }
    #banner {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
      color: #fff; font-weight: 900; font-size: 13vw; -webkit-text-stroke: 4px #000;
      text-align: center; pointer-events: none; opacity: 0; transition: opacity .3s;
    }
    #warn {
      position: fixed; top: 15%; left: 50%; color: #fff; background: rgba(214,40,40,.92);
      border: 3px solid #000; padding: 8px 22px; border-radius: 12px;
      font-weight: 900; font-size: clamp(16px, 3.4vw, 30px); -webkit-text-stroke: 1px #000;
      pointer-events: none; opacity: 0; transition: opacity .2s; z-index: 40; white-space: nowrap;
      animation: warnpulse .5s infinite alternate;
    }
    @keyframes warnpulse {
      from { transform: translateX(-50%) scale(1); }
      to   { transform: translateX(-50%) scale(1.06); }
    }

    /* plovoucí health bary nad dinosaury */
    #bars { position: fixed; inset: 0; pointer-events: none; }
    .hpbox { position: absolute; transform: translate(-50%,-50%); text-align: center; }
    .hptag {
      font-size: 11px; font-weight: 800; color: #fff; white-space: nowrap;
      -webkit-text-stroke: 2px #000; text-stroke: 2px #000; margin-bottom: 3px;
    }
    .hpbar {
      width: 64px; height: 8px; margin: 0 auto; background: #1b1f2a;
      border: 2px solid #000; border-radius: 6px; overflow: hidden;
    }
    .hpfill { height: 100%; width: 100%; background: #56d364;
      transition: width .12s linear, background .2s; }
    .hpbox.me .hptag { color: #ffe14d; font-size: 12px; }
    .hpbox.me .hpbar { width: 84px; height: 10px; box-shadow: 0 0 0 2px #ffe14d; }
    .hpbox.ko .hptag { color: #f85149; }

    /* menu výběru dinosaura */
    #menu {
      position: fixed; inset: 0; z-index: 50; display: flex;
      flex-direction: column; align-items: center; justify-content: center;
      background: linear-gradient(180deg, rgba(8,12,28,.5), rgba(8,12,28,.8));
    }
    #menu h1 {
      color: #fff; font-size: 44px; font-weight: 900; letter-spacing: 1px;
      -webkit-text-stroke: 2px #000; text-stroke: 2px #000;
    }
    #menu .sub { color: #cdd6ff; font-weight: 700; margin: 4px 0 22px; }
    #cards {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px;
      width: min(900px, 92vw);
    }
    .card {
      text-align: left; cursor: pointer; font: inherit; color: #fff;
      background: #141a32; border: 2px solid #2a335e; border-bottom-width: 4px;
      border-radius: 14px; padding: 14px;
      transition: transform .08s, border-color .12s, background .12s;
    }
    .card:hover { transform: translateY(-3px); border-color: #ffe14d; background: #1a2240; }
    .chead { font-size: 18px; font-weight: 900; display: flex; align-items: center; gap: 8px; }
    .dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid #000; flex: none; }
    .catk { font-size: 12px; color: #ffd86b; font-weight: 700; margin: 5px 0 10px; }
    .st { display: flex; align-items: center; gap: 8px; font-size: 11px; margin: 4px 0; color: #aeb8e0; }
    .st span { width: 66px; flex: none; }
    .st i { flex: 1; height: 7px; background: #0e1226; border-radius: 4px; overflow: hidden; }
    .st b { display: block; height: 100%; background: #56d364; }
    #modes { display: flex; gap: 10px; margin-bottom: 16px; }
    #modes button {
      font: inherit; font-weight: 800; color: #cdd6ff; cursor: pointer;
      background: #141a32; border: 2px solid #2a335e; border-bottom-width: 4px;
      border-radius: 10px; padding: 8px 16px;
    }
    #modes button.on { color: #0b1020; background: #ffe14d; border-color: #c9ad28; }
    #maps { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; justify-content: center; }
    #maps button {
      font: inherit; font-weight: 800; color: #cdd6ff; cursor: pointer;
      background: #141a32; border: 2px solid #2a335e; border-bottom-width: 4px;
      border-radius: 10px; padding: 7px 14px;
    }
    #maps button.on { color: #0b1020; background: #5ab0ff; border-color: #2f7fc9; }
    .card.disabled { opacity: .35; pointer-events: none; filter: grayscale(.6); }
    .card.p1 { opacity: 1 !important; filter: none !important; border-color: #3b82f6 !important; box-shadow: 0 0 0 3px #3b82f6; }
    .card.p2 { opacity: 1 !important; filter: none !important; border-color: #ef4444 !important; box-shadow: 0 0 0 3px #ef4444; }
    .card.p1 .chead::after { content: ' ①'; color: #3b82f6; }
    .card.p2 .chead::after { content: ' ②'; color: #ef4444; }

    /* split-screen: dělící čára + per-hráč HUD */
    #divider {
      position: fixed; left: 0; top: 50%; height: 3px; width: 100%;
      background: #0b0f1e; transform: translateY(-50%); z-index: 25; display: none;
    }
    .pHud {
      position: fixed; left: 14px; z-index: 20; width: 60%; pointer-events: none;
      color: #fff; font-weight: 800; text-shadow: 2px 2px 0 #000;
    }
    .pHud.top { top: 12px; }
    .pHud.bottom { top: calc(50% + 12px); }
    .pHud .pname { font-size: 19px; }
    .pHud .pinfo { font-size: 13px; opacity: .9; margin: 2px 0 6px; }
    .pHud .pb { display: flex; align-items: center; gap: 6px; font-size: 11px; margin: 3px 0; max-width: 210px; }
    .pHud .pb span { width: 44px; flex: none; }
    .pHud .pb i { flex: 1; height: 8px; background: #1b1f2a; border: 2px solid #000; border-radius: 5px; overflow: hidden; }
    .pHud .pb b { display: block; height: 100%; width: 100%; background: #56d364; transition: width .1s, background .2s; }
    .pHud .pspeed { font-size: 22px; margin-top: 4px; }
  </style>
</head>
<body>
  <div id="app"></div>

  <div class="hud" id="topleft">
    <div class="species" data-species>—</div>
    <div class="attack"  data-attack>útok: —</div>
    <div class="stamina"><span>Turbo</span><i><b data-stamina></b></i></div>
    <div class="rage"><span>Rage</span><i><b data-rage></b></i></div>
    <div class="item">Předmět: <b data-item>—</b> <small>(E)</small></div>
  </div>
  <div class="hud" id="topright">
    <div class="lap" data-lap>Kolo 1/2</div>
    <div class="pos" data-pos>Pozice —/—</div>
  </div>
  <div class="hud" id="speedo"><span data-speed>0</span> <small>km/h</small></div>

  <div id="fx"></div>
  <div id="bars"></div>
  <div id="banner"></div>
  <div id="warn"></div>

  <!-- dělící čára pro split-screen -->
  <div id="divider"></div>

  <!-- menu výběru dinosaura -->
  <div id="menu">
    <h1>🦖 DINORACE</h1>
    <div id="modes">
      <button data-mode="1" class="on">1 hráč</button>
      <button data-mode="2">2 hráči (split-screen)</button>
    </div>
    <div id="maps"></div>
    <div class="sub" data-prompt>Vyber svého dinosaura</div>
    <div id="cards"></div>
  </div>

  <div id="help">
    <b>Řízení:</b> <kbd>W</kbd>/<kbd>↑</kbd> plyn · <kbd>S</kbd>/<kbd>↓</kbd> brzda ·
    <kbd>A</kbd><kbd>D</kbd>/<kbd>←</kbd><kbd>→</kbd> zatáčení ·
    <kbd>mezerník</kbd> ÚTOK · <kbd>R</kbd> restart
  </div>

  <!-- Three.js přes importmap z CDN (žádný build) -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
